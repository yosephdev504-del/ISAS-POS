<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ISAS Baleadas — Punto de Venta</title>
  <meta name="description" content="Sistema de Punto de Venta para ISAS Baleadas. Gestión rápida de pedidos y ventas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- ════════════ HEADER ════════════ -->
  <header id="app-header">
    <div class="header-left">
      <span class="brand-icon">🫓</span>
      <h1 class="brand-name">ISAS <span class="brand-accent">Baleadas</span></h1>
    </div>
    <div class="header-right">
      <span id="current-time" class="header-clock"></span>
      <button id="btn-dashboard" class="btn-icon" title="Dashboard de Ventas">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span>Ventas</span>
      </button>
    </div>
  </header>

  <!-- ════════════ MAIN LAYOUT ════════════ -->
  <main id="app-main">
    <!-- ──── MENU COLUMN ──── -->
    <section id="menu-panel" aria-label="Menú de Productos">
      <div class="menu-header">
        <h2 class="section-title">Menú</h2>
        <span id="product-count" class="badge"></span>
      </div>
      <div id="menu-grid" class="menu-grid">
        <!-- Cards generated by JS -->
      </div>
    </section>

    <!-- ──── INVOICE COLUMN ──── -->
    <aside id="invoice-panel" aria-label="Pedido Actual">
      <div class="invoice-header">
        <h2 class="section-title">Pedido Actual</h2>
        <button id="btn-clear-order" class="btn-ghost-danger" title="Limpiar pedido">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
          Limpiar
        </button>
      </div>

      <!-- Customer Alias -->
      <div class="alias-wrapper">
        <input type="text" id="customer-alias" class="alias-input" placeholder="Alias del Cliente (Nombre, apodo o característica física)" autocomplete="off"/>
      </div>

      <!-- Order Items -->
      <div id="order-list" class="order-list">
        <div id="empty-order" class="empty-order">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.35"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <p>Toca un producto para agregarlo</p>
        </div>
      </div>

      <!-- Total & Charge -->
      <div class="invoice-footer">
        <div class="total-row">
          <span class="total-label">TOTAL</span>
          <span id="total-amount" class="total-amount">L 0.00</span>
        </div>
        <button id="btn-charge" class="btn-charge" disabled>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Cobrar
        </button>
      </div>
    </aside>
  </main>

  <!-- ════════════ DASHBOARD MODAL ════════════ -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal-dashboard" class="modal" role="dialog" aria-labelledby="modal-title">
      <div class="modal-header">
        <h2 id="modal-title" class="modal-title">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          Dashboard de Ventas
        </h2>
        <button id="btn-close-modal" class="btn-icon-close" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body">
        <!-- Today -->
        <div class="stat-card stat-today">
          <div class="stat-icon">📅</div>
          <div class="stat-info">
            <span class="stat-label">Ingresos de Hoy</span>
            <span id="stat-today" class="stat-value">L 0.00</span>
          </div>
        </div>
        <!-- Week -->
        <div class="stat-card stat-week">
          <div class="stat-icon">📆</div>
          <div class="stat-info">
            <span class="stat-label">Ingresos de la Semana</span>
            <span id="stat-week" class="stat-value">L 0.00</span>
          </div>
        </div>
        <!-- Count -->
        <div class="stat-card stat-count">
          <div class="stat-icon">🧾</div>
          <div class="stat-info">
            <span class="stat-label">Ventas de Hoy</span>
            <span id="stat-count" class="stat-value">0</span>
          </div>
        </div>
        <!-- Recent Sales -->
        <div class="recent-sales-section">
          <h3 class="recent-title">Ventas Recientes (Hoy)</h3>
          <div id="recent-sales-list" class="recent-sales-list">
            <p class="no-sales">Sin ventas registradas hoy.</p>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="btn-clear-history" class="btn-danger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2-2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
          Borrar historial de ventas
        </button>
      </div>
    </div>
  </div>

  <!-- ════════════ SUCCESS TOAST ════════════ -->
  <div id="toast" class="toast" hidden>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <span id="toast-msg">Venta registrada</span>
  </div>

  <script src="app.js"></script>
</body>
</html>
